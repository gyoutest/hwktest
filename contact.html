<body>
  <main class="simple-main">
    <section class="simple-hero">
      <p class="eyebrow">Contact</p>
      <h1>문의하기</h1>
      <p class="simple-copy">추가 희망 메뉴, 카테고리 제안, 오류 제보, 기타 피드백을 남길 수 있습니다. 전달된 내용은 서비스 개선 검토에 활용됩니다.</p>
      <div class="simple-actions">
        <a class="simple-link primary" href="index.html">메인으로 돌아가기</a>
        <a class="simple-link" href="about.html">서비스 소개</a>
        <a class="simple-link" href="privacy.html">개인정보처리방침</a>
      </div>
    </section>

    <section class="simple-section">
      <h2>문의 폼</h2>
      <form class="contact-page-form" action="https://formspree.io/f/xvzvbovq" method="POST" target="_blank">
        <label class="contact-label" for="pageContactType">문의 유형</label>
        <select id="pageContactType" class="contact-input" name="문의 유형" required>
          <option value="추가 희망하는 카테고리 또는 메뉴">추가 희망하는 카테고리 또는 메뉴</option>
          <option value="오류 제보">오류 제보</option>
          <option value="기타 문의사항">기타 문의사항</option>
        </select>
        <label class="contact-label" for="pageContactEmail">답변받을 이메일</label>
        <input id="pageContactEmail" class="contact-input" type="email" name="email" placeholder="name@example.com" />
        <label class="contact-label" for="pageContactMessage">문의 내용</label>
        <textarea id="pageContactMessage" class="contact-input contact-textarea" name="message" placeholder="원하는 카테고리나 메뉴, 발견한 오류, 기타 의견을 적어주세요." required></textarea>
        <input type="hidden" name="서비스" value="머먹" />
        <button class="primary-button" type="submit">문의 보내기</button>
      </form>
    </section>
